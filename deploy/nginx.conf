# ToptierProxy.com — Nginx config for Truehost VPS (Path B: static hosting)
#
# Place built site in /var/www/toptierproxy (run on VPS):
#   git pull
#   npm ci
#   node scripts/build-static.mjs
#   npm run build
#   sudo rsync -a --delete dist/ /var/www/toptierproxy/
#
# Then symlink: /etc/nginx/sites-enabled/toptierproxy -> this file, and reload nginx.

server {
    listen 80;
    listen [::]:80;
    server_name toptierproxy.com www.toptierproxy.com;
    # Force HTTPS (uncomment after Certbot issues a cert)
    # return 301 https://toptierproxy.com$request_uri;

    root /var/www/toptierproxy;
    index index.html;

    # gzip + brotli (brotli requires nginx-module-brotli)
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # Long-cache hashed assets
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Static SEO files
    location = /robots.txt    { try_files /robots.txt =404; access_log off; }
    location = /sitemap.xml   { try_files /sitemap.xml =404; add_header Content-Type application/xml; }
    location = /favicon.svg   { try_files /favicon.svg =404; access_log off; }

    # Affiliate redirects: noindex via header, served as static HTML (meta-refresh)
    location ^~ /go/ {
        add_header X-Robots-Tag "noindex, nofollow" always;
        add_header Cache-Control "no-store" always;
        try_files $uri $uri/ $uri/index.html =404;
    }

    # SPA fallback for all other routes
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
}

# After installing certbot:
#   sudo certbot --nginx -d toptierproxy.com -d www.toptierproxy.com
